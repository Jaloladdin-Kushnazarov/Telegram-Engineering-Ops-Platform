# ===================================================================
# Telegram Engineering Ops Platform — asosiy konfiguratsiya
# ===================================================================

# Ilova nomi
spring.application.name=engops-platform

# --- Ma'lumotlar bazasi (PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/engops
spring.datasource.username=engops
spring.datasource.password=engops_local

# --- HikariCP ulanish havzasi (connection pool) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=engops-hikari-pool

# --- JPA / Hibernate ---
# open-in-view o'chirilgan — lazy loading xavfini oldini oladi
spring.jpa.open-in-view=false
# validate — Hibernate faqat schema to'g'riligini tekshiradi, o'zgartirmaydi
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway (DB migration) ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# --- Server ---
server.port=8080

# --- Actuator (monitoring) ---
management.endpoints.web.exposure.include=health,info,metrics,flyway
management.endpoint.health.show-details=when-authorized

# --- Logging ---
logging.level.root=INFO
logging.level.com.engops.platform=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
# Log formatida correlation-id ko'rsatiladi — har bir so'rovni kuzatish uchun
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-}] %-5level %logger{36} - %msg%n