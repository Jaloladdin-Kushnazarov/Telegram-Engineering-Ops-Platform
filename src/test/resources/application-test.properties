# ===================================================================
# Test profili — H2 in-memory baza, tashqi bog'liqlik yo'q
# ===================================================================

# H2 in-memory baza — har bir test uchun yangi, toza baza yaratiladi
spring.datasource.url=jdbc:h2:mem:engops-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate schema'ni avtomatik yaratadi va test tugagach o'chiradi
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway o'chirilgan — testlarda H2 ishlatiladi, PostgreSQL migration'lar mos kelmaydi
spring.flyway.enabled=false

# SQL loglarni ko'rsatadi — test debug uchun foydali
spring.jpa.show-sql=true

logging.level.com.engops.platform=DEBUG