# ===================================================================
# Test profili — H2 in-memory baza, tashqi bog'liqlik yo'q
# ===================================================================

# H2 in-memory baza — har bir test uchun yangi, toza baza yaratiladi
spring.datasource.url=jdbc:h2:mem:engops-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate schema'ni avtomatik yaratadi va test tugagach o'chiradi
# Dialect avtomatik aniqlanadi (H2 uchun ham) — explicit belgilash shart emas
spring.jpa.hibernate.ddl-auto=create-drop

# Flyway o'chirilgan — testlarda H2 ishlatiladi, PostgreSQL migration'lar mos kelmaydi
spring.flyway.enabled=false

# SQL loglar o'chirilgan — test output toza bo'lishi uchun
# Debug kerak bo'lsa: true qilib qo'ying
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.show_sql=false

# Test loglari — faqat muhim xabarlar ko'rsatiladi
logging.level.com.engops.platform=WARN
# Hibernate SQL loglari o'chirilgan — test output toza bo'lishi uchun
logging.level.org.hibernate.SQL=WARN