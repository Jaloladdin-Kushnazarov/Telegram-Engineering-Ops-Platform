services:
  postgres:
    image: postgres:17-alpine
    container_name: engops-postgres
    environment:
      POSTGRES_DB: engops
      POSTGRES_USER: engops
      POSTGRES_PASSWORD: engops_local
    ports:
      - "5432:5432"
    volumes:
      - engops-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engops"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  engops-pgdata:
